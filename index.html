<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SFS Pro - Realistic Builder</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: #eee; user-select: none; }
        canvas { display: block; }
        #ui, #build-menu { position: absolute; background: rgba(15, 15, 15, 0.95); border: 1px solid #333; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { top: 20px; left: 20px; display: none; }
        #build-menu { right: 20px; top: 20px; bottom: 20px; width: 200px; border-left: 3px solid #007bff; }
        .part-item { 
            background: linear-gradient(145deg, #222, #111); border: 1px solid #444; padding: 12px; margin: 10px 0; 
            cursor: grab; text-align: center; border-radius: 5px; transition: 0.3s; font-size: 14px;
        }
        .part-item:hover { border-color: #007bff; transform: scale(1.05); }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        #btn-launch { background: #28a745; color: white; margin-top: 20px; box-shadow: 0 4px 0 #1e7e34; }
        #btn-launch:active { transform: translateY(3px); box-shadow: none; }
        .stat { font-family: 'Courier New', monospace; margin-bottom: 8px; color: #00ff00; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">ALT: <span id="alt">0</span> m</div>
    <div class="stat">VEL: <span id="vel">0</span> m/s</div>
    <div class="stat">COMB: <span id="fuel">100</span>%</div>
</div>

<div id="build-menu">
    <h2 style="margin:0 0 15px 0; font-size: 18px; color: #007bff;">VAB Workshop</h2>
    <div class="part-item" onmousedown="pickPart('capsule')">Capsula Comando</div>
    <div class="part-item" onmousedown="pickPart('fuel')">Serbatoio Titanio</div>
    <div class="part-item" onmousedown="pickPart('engine')">Motore Hawk</div>
    <div class="part-item" onmousedown="pickPart('separator')">Separatore Idraulico</div>
    <div class="part-item" onmousedown="pickPart('leg')">Gambe Idrauliche</div>
    <div class="part-item" onmousedown="pickPart('solar')">Pannello Solare</div>
    <button id="btn-launch" onclick="startLaunch()">Inizia Missione</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mode = 'BUILD';
let partsInRocket = [];
let draggingPart = null;
let mouse = { x: 0, y: 0 };
const SNAP_DIST = 25; // Distanza di aggancio automatico

const planet = { x: 0, y: 10000 + 400, r: 10000, gravity: 40000 };
let ship = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, fuel: 100, totalFuel: 100 };

const partData = {
    capsule:  { w: 40, h: 35, type: 'command' },
    fuel:     { w: 40, h: 60, type: 'fuel' },
    engine:   { w: 34, h: 25, type: 'engine' },
    separator:{ w: 42, h: 12, type: 'separator' },
    leg:      { w: 12, h: 40, type: 'leg' },
    solar:    { w: 15, h: 50, type: 'solar' }
};

// --- Gestione Input ---
window.onmousemove = (e) => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    if (draggingPart) {
        // Logica di AGGANCIO (Snap)
        let snapped = false;
        partsInRocket.forEach(p => {
            // Controlla aggancio verticale (Sopra/Sotto)
            if (Math.abs(mouse.x - p.x) < SNAP_DIST) {
                // Prova ad agganciare sotto
                if (Math.abs(mouse.y - (p.y + p.h/2 + draggingPart.h/2)) < SNAP_DIST) {
                    draggingPart.x = p.x;
                    draggingPart.y = p.y + p.h/2 + draggingPart.h/2;
                    snapped = true;
                }
                // Prova ad agganciare sopra
                else if (Math.abs(mouse.y - (p.y - p.h/2 - draggingPart.h/2)) < SNAP_DIST) {
                    draggingPart.x = p.x;
                    draggingPart.y = p.y - p.h/2 - draggingPart.h/2;
                    snapped = true;
                }
            }
        });
        if (!snapped) {
            draggingPart.x = mouse.x;
            draggingPart.y = mouse.y;
        }
    }
};

window.onmousedown = (e) => {
    if (mode !== 'BUILD') return;
    partsInRocket.forEach((p, i) => {
        if (Math.abs(mouse.x - p.x) < p.w/2 && Math.abs(mouse.y - p.y) < p.h/2) {
            draggingPart = partsInRocket.splice(i, 1)[0];
        }
    });
};

window.onmouseup = () => { draggingPart = null; };

function pickPart(id) {
    draggingPart = { ...partData[id], x: mouse.x, y: mouse.y, id: id };
    partsInRocket.push(draggingPart);
}

// --- Rendering Realistico ---
function drawRealisticPart(p, isFlight) {
    ctx.save();
    ctx.translate(p.x, p.y);
    
    const w = p.w; const h = p.h;

    switch(p.id) {
        case 'capsule':
            let gradC = ctx.createLinearGradient(-w/2, 0, w/2, 0);
            gradC.addColorStop(0, '#555'); gradC.addColorStop(0.5, '#eee'); gradC.addColorStop(1, '#555');
            ctx.fillStyle = gradC;
            ctx.beginPath();
            ctx.moveTo(-w/2, h/2); ctx.lineTo(w/2, h/2); ctx.lineTo(w/4, -h/2); ctx.lineTo(-w/4, -h/2);
            ctx.closePath(); ctx.fill();
            // Oblò
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
            break;

        case 'fuel':
            let gradF = ctx.createLinearGradient(-w/2, 0, w/2, 0);
            gradF.addColorStop(0, '#ccc'); gradF.addColorStop(0.5, '#fff'); gradF.addColorStop(1, '#ccc');
            ctx.fillStyle = gradF;
            ctx.fillRect(-w/2, -h/2, w, h);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            for(let i=-h/2; i<h/2; i+=15) ctx.strokeRect(-w/2, i, w, 1);
            break;

        case 'engine':
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(-w/2, -h/2); ctx.lineTo(w/2, -h/2);
            ctx.lineTo(w/2+8, h/2); ctx.lineTo(-w/2-8, h/2);
            ctx.fill();
            // Dettagli ugello
            ctx.fillStyle = '#111'; ctx.fillRect(-w/4, -h/2, w/2, 5);
            break;

        case 'separator':
            ctx.fillStyle = '#ffc107'; ctx.fillRect(-w/2, -h/2, w, h);
            ctx.fillStyle = '#444'; ctx.fillRect(-w/2, -2, w, 4);
            break;

        case 'solar':
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-w/2, -h/2, w, h);
            ctx.strokeStyle = '#007bff'; ctx.lineWidth = 1;
            for(let i=-h/2; i<h/2; i+=5) ctx.strokeRect(-w/2, i, w, 5);
            break;

        case 'leg':
            ctx.fillStyle = '#777'; ctx.fillRect(-2, -h/2, 4, h);
            ctx.fillStyle = '#444'; ctx.fillRect(-w/2, h/2-4, w, 4);
            break;
    }
    ctx.restore();
}

function startLaunch() {
    if (partsInRocket.length === 0) return;
    mode = 'FLIGHT';
    document.getElementById('build-menu').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    
    // Ordina i pezzi per altezza per il rendering di volo
    partsInRocket.sort((a,b) => a.y - b.y);
    let baseY = partsInRocket[0].y;
    partsInRocket.forEach(p => p.y -= baseY); // Rendiamo le coordinate relative alla cima

    ship.x = planet.x;
    ship.y = planet.y - planet.r - 60;
    ship.fuel = partsInRocket.filter(p => p.id === 'fuel').length * 100;
    ship.totalFuel = ship.fuel || 1;
}

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function update() {
    if (mode === 'FLIGHT') {
        let dx = planet.x - ship.x;
        let dy = planet.y - ship.y;
        let d = Math.sqrt(dx*dx + dy*dy);
        let g = planet.gravity / (d*d);
        
        ship.vx += (dx/d) * g;
        ship.vy += (dy/d) * g;

        if (keys['ArrowLeft']) ship.angle -= 0.03;
        if (keys['ArrowRight']) ship.angle += 0.03;
        
        if (keys['ArrowUp'] && ship.fuel > 0) {
            ship.vx += Math.cos(ship.angle) * 0.25;
            ship.vy += Math.sin(ship.angle) * 0.25;
            ship.fuel -= 0.4;
        }

        ship.x += ship.vx; ship.y += ship.vy;
        if (d < planet.r + 20) {
            ship.vx *= 0.9; ship.vy *= 0.9;
            ship.y -= (dy/d) * (planet.r + 20 - d);
        }

        document.getElementById('alt').innerText = Math.floor(d - planet.r);
        document.getElementById('vel').innerText = Math.floor(Math.sqrt(ship.vx**2 + ship.vy**2)*10);
        document.getElementById('fuel').innerText = Math.max(0, Math.floor((ship.fuel/ship.totalFuel)*100));
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (mode === 'BUILD') {
        // Sfondo Officina
        ctx.fillStyle = '#111';
        for(let i=0; i<canvas.width; i+=50) ctx.fillRect(i, 0, 1, canvas.height);
        for(let i=0; i<canvas.height; i+=50) ctx.fillRect(0, i, canvas.width, 1);
        
        partsInRocket.forEach(p => drawRealisticPart(p, false));
    } else {
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(ship.angle + Math.PI/2);
        partsInRocket.forEach(p => drawRealisticPart(p, true));
        
        // Effetto Fiamma Realistico
        if (keys['ArrowUp'] && ship.fuel > 0) {
            let last = partsInRocket[partsInRocket.length-1];
            let fl = 40 + Math.random() * 20;
            let gradV = ctx.createLinearGradient(0, last.y, 0, last.y + fl);
            gradV.addColorStop(0, '#fff'); gradV.addColorStop(0.2, '#00fbff'); gradV.addColorStop(0.5, '#ff4500'); gradV.addColorStop(1, 'transparent');
            ctx.fillStyle = gradV;
            ctx.beginPath(); ctx.moveTo(-15, last.y+10); ctx.lineTo(15, last.y+10); ctx.lineTo(0, last.y + fl); ctx.fill();
        }
        ctx.restore();

        // Pianeta
        ctx.save();
        ctx.translate(canvas.width/2 - ship.x, canvas.height/2 - ship.y);
        let gradP = ctx.createRadialGradient(planet.x, planet.y, planet.r*0.8, planet.x, planet.y, planet.r);
        gradP.addColorStop(0, '#111'); gradP.addColorStop(1, '#222');
        ctx.fillStyle = gradP;
        ctx.beginPath(); ctx.arc(planet.x, planet.y, planet.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
    requestAnimationFrame(() => { update(); draw(); });
}
draw();
</script>
</body>
</html>
