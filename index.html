<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SFS Pro Clone - Full Physics</title>
    <style>
        :root { --ui-panel: rgba(30, 30, 30, 0.9); --accent: #3498db; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; }
        
        /* Sidebar Editor */
        #editor { width: 240px; background: #1a1a1a; border-right: 1px solid #333; z-index: 100; display: flex; flex-direction: column; }
        .tab-title { padding: 20px; font-weight: bold; border-bottom: 1px solid #333; text-align: center; background: #222; }
        .part-btn { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .part-btn:hover { background: #2c2c2c; border-left: 4px solid var(--accent); }
        .icon-box { width: 30px; height: 30px; border: 2px solid #666; }

        /* Area di Gioco */
        #game-wrapper { flex-grow: 1; position: relative; background: linear-gradient(to bottom, #000 0%, #1a2a6c 100%); }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI di Volo */
        .hud { position: absolute; padding: 15px; background: var(--ui-panel); border-radius: 8px; pointer-events: none; border: 1px solid #444; }
        #telemetry { top: 20px; right: 20px; min-width: 150px; }
        #fuel-gauge { bottom: 20px; left: 20px; width: 250px; }
        .bar-bg { background: #333; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #fuel-fill { background: var(--accent); height: 100%; width: 100%; transition: width 0.1s; }
        
        #launch-btn { position: absolute; bottom: 30px; right: 30px; padding: 15px 40px; background: #27ae60; border: none; color: white; font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #launch-btn:hover { background: #2ecc71; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="editor">
    <div class="tab-title">COSTRUZIONE</div>
    <div class="part-btn" onclick="spawnPart('capsule')"><div class="icon-box" style="border-radius: 50% 50% 0 0"></div> Capsula</div>
    <div class="part-btn" onclick="spawnPart('tank')"><div class="icon-box"></div> Serbatoio Carburante</div>
    <div class="part-btn" onclick="spawnPart('engine')"><div class="icon-box" style="border-top:none"></div> Motore Hawk</div>
</div>

<div id="game-wrapper">
    <button id="launch-btn" onclick="startMission()">LANCIA MISSIONE</button>
    
    <div id="telemetry" class="hud" style="display:none">
        <div style="color: #888; font-size: 0.8em;">ALTITUDINE</div>
        <div id="alt-val" style="font-size: 1.4em; font-weight: bold;">0 m</div>
        <div style="color: #888; font-size: 0.8em; margin-top: 10px;">VELOCITÀ VERTICALE</div>
        <div id="vel-val" style="font-size: 1.4em; font-weight: bold;">0.0 m/s</div>
    </div>

    <div id="fuel-gauge" class="hud" style="display:none">
        <div style="font-size: 0.9em;">CARBURANTE</div>
        <div class="bar-bg"><div id="fuel-fill"></div></div>
    </div>

    <canvas id="sfsCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('sfsCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'build';
let parts = [];
let stars = [];
let rocket = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, fuel: 100, mass: 1, throttle: 0 };
let camY = 0;
let worldY = 0;

// Inizializzazione Stelle
for(let i=0; i<200; i++) {
    stars.push({ x: Math.random() * 3000, y: Math.random() * 3000, s: Math.random() * 2 });
}

function resize() {
    canvas.width = window.innerWidth - (gameState === 'build' ? 240 : 0);
    canvas.height = window.innerHeight;
    if(gameState === 'build') {
        rocket.x = canvas.width / 2;
        rocket.y = canvas.height - 150;
    }
}
window.addEventListener('resize', resize);
resize();

function spawnPart(type) {
    const config = {
        capsule: { w: 40, h: 40, color: '#bdc3c7', mass: 2 },
        tank: { w: 40, h: 60, color: '#ecf0f1', mass: 4 },
        engine: { w: 34, h: 25, color: '#34495e', mass: 1, isEngine: true }
    };
    let p = config[type];
    let yPos = parts.length > 0 ? parts[0].y - p.h : rocket.y - p.h;
    parts.unshift({ ...p, type, x: rocket.x - p.w/2, y: yPos });
}

function startMission() {
    if(parts.length < 2) return alert("Costruisci un razzo!");
    gameState = 'flight';
    document.getElementById('editor').style.display = 'none';
    document.getElementById('launch-btn').style.display = 'none';
    document.querySelectorAll('.hud').forEach(el => el.style.display = 'block');
    resize();
}

let keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function drawBackground() {
    // Atmosfera dinamica: diventa nera man mano che sali
    let alt = Math.abs(worldY) / 10;
    let skyB = Math.max(0, 100 - alt/50); 
    let skyG = Math.max(0, 40 - alt/100);
    ctx.fillStyle = `rgb(0, ${skyG}, ${skyB})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Stelle (si muovono con la telecamera)
    ctx.fillStyle = "white";
    stars.forEach(s => {
        let sy = (s.y - camY * 0.5) % canvas.height;
        if(sy < 0) sy += canvas.height;
        ctx.fillRect(s.x % canvas.width, sy, s.s, s.s);
    });
}

function update() {
    if(gameState !== 'flight') return;

    // Controlli
    if(keys['ArrowLeft']) rocket.angle -= 0.04;
    if(keys['ArrowRight']) rocket.angle += 0.04;
    
    if(keys['ArrowUp'] && rocket.fuel > 0) {
        let power = 0.25;
        rocket.vx += Math.cos(rocket.angle) * power;
        rocket.vy += Math.sin(rocket.angle) * power;
        rocket.fuel -= 0.15;
    }

    // Fisica
    rocket.vy += 0.08; // Gravità
    rocket.x += rocket.vx;
    rocket.y += rocket.vy;
    worldY = rocket.y - (canvas.height - 150);

    // Camera follow fluida
    let targetCamY = rocket.y - canvas.height / 1.5;
    camY += (targetCamY - camY) * 0.1;

    // Collisione terreno
    if(rocket.y > canvas.height - 150) {
        rocket.y = canvas.height - 150;
        rocket.vy = 0;
        rocket.vx *= 0.8;
    }

    // UI
    document.getElementById('alt-val').innerText = Math.floor(Math.abs(worldY)/5) + " m";
    document.getElementById('vel-val').innerText = (-rocket.vy * 2).toFixed(1) + " m/s";
    document.getElementById('fuel-fill').style.width = rocket.fuel + "%";
}

function draw() {
    drawBackground();

    ctx.save();
    ctx.translate(0, -camY);

    // Terreno (Erba/Terra)
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(0, canvas.height - 150, canvas.width, 1000);
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(0, canvas.height - 150, canvas.width, 5);

    // Disegno Razzo
    ctx.save();
    ctx.translate(rocket.x, rocket.y);
    ctx.rotate(rocket.angle + Math.PI/2);

    let currentY = 0;
    parts.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        
        // Disegno forme specifiche
        if(p.type === 'capsule') {
            ctx.beginPath();
            ctx.moveTo(-p.w/2, 0); ctx.lineTo(p.w/2, 0);
            ctx.lineTo(p.w/4, -p.h); ctx.lineTo(-p.w/4, -p.h);
            ctx.closePath(); ctx.fill(); ctx.stroke();
        } else {
            ctx.fillRect(-p.w/2, -currentY - p.h, p.w, p.h);
            ctx.strokeRect(-p.w/2, -currentY - p.h, p.w, p.h);
        }

        // Effetto Fiamme Motore
        if(p.isEngine && keys['ArrowUp'] && rocket.fuel > 0) {
            ctx.fillStyle = "rgba(255, 165, 0, " + (0.5 + Math.random()*0.5) + ")";
            ctx.beginPath();
            ctx.moveTo(-10, 0); ctx.lineTo(10, 0); 
            ctx.lineTo(0, 40 + Math.random()*20);
            ctx.fill();
        }
        currentY += p.h;
    });

    ctx.restore();
    ctx.restore();

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
