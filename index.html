<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SFS Clone - Fixed Flight</title>
    <style>
        :root { --accent: #4a90e2; --ui-bg: #1e1e1e; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        
        #vab-sidebar {
            position: absolute; right: 0; top: 0; bottom: 0; width: 220px;
            background: var(--ui-bg); border-left: 2px solid #333; z-index: 100;
            padding: 10px;
        }
        .part-item {
            background: #2a2a2a; border: 1px solid #444; margin-bottom: 8px;
            padding: 15px; text-align: center; cursor: pointer; border-radius: 4px;
        }
        .part-item:hover { border-color: var(--accent); }
        
        #launch-bar {
            position: absolute; bottom: 20px; left: 20px; z-index: 101;
        }
        .btn-launch {
            background: #28a745; color: white; border: none; padding: 15px 30px;
            font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        #hud { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; display: none;
        }
    </style>
</head>
<body>

<div id="vab-sidebar">
    <h3 style="font-size: 14px; color: #888;">COMPONENTI</h3>
    <div class="part-item" onmousedown="createPart('capsule')">Capsula</div>
    <div class="part-item" onmousedown="createPart('fuel')">Serbatoio</div>
    <div class="part-item" onmousedown="createPart('engine')">Motore</div>
    <div class="part-item" onmousedown="createPart('separator')">Separatore</div>
</div>

<div id="launch-bar">
    <button class="btn-launch" onclick="launchRocket()">LANCIA MISSIONE</button>
</div>

<div id="hud">
    <div style="font-size: 20px;"><span id="h-vel">0</span> m/s</div>
    <div style="font-size: 14px; color: #aaa;">Altitudine: <span id="h-alt">0</span> m</div>
</div>

<canvas id="screen"></canvas>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mode = 'BUILD';
let rocketParts = [];
let activePart = null;

const PART_DATA = {
    capsule:  { w: 40, h: 32, color: '#d1d1d1' },
    fuel:     { w: 40, h: 60, color: '#f0f0f0' },
    engine:   { w: 32, h: 25, color: '#444' },
    separator:{ w: 40, h: 10, color: '#ffcc00' }
};

// --- EDITOR ---
function createPart(id) {
    const data = PART_DATA[id];
    // Crea il pezzo al centro dell'area di costruzione (non sotto il menu)
    activePart = { ...data, id, x: (canvas.width - 220) / 2, y: canvas.height / 2 };
    rocketParts.push(activePart);
}

window.addEventListener('mousedown', (e) => {
    if (e.clientX > window.innerWidth - 220) return;
    const mx = e.clientX; const my = e.clientY;
    
    for (let i = rocketParts.length - 1; i >= 0; i--) {
        let p = rocketParts[i];
        if (mx > p.x - p.w/2 && mx < p.x + p.w/2 && my > p.y - p.h/2 && my < p.y + p.h/2) {
            activePart = rocketParts.splice(i, 1)[0];
            break;
        }
    }
});

window.addEventListener('mousemove', (e) => {
    if (!activePart) return;
    activePart.x = e.clientX;
    activePart.y = e.clientY;

    // Snap magnetico
    rocketParts.forEach(p => {
        if (Math.abs(activePart.x - p.x) < 20) {
            if (Math.abs(activePart.y - (p.y + p.h/2 + activePart.h/2)) < 15) {
                activePart.x = p.x; activePart.y = p.y + p.h/2 + activePart.h/2;
            }
            if (Math.abs(activePart.y - (p.y - p.h/2 - activePart.h/2)) < 15) {
                activePart.x = p.x; activePart.y = p.y - p.h/2 - activePart.h/2;
            }
        }
    });
});

window.addEventListener('mouseup', () => activePart = null);

// --- VOLO ---
let ship = { x: 0, y: 0, vx: 0, vy: 0, rot: -Math.PI/2 };

function launchRocket() {
    if (rocketParts.length === 0) return;
    
    // Calcola il centro del razzo costruito per resettare le coordinate
    let centerX = rocketParts[0].x;
    let centerY = rocketParts[0].y;
    
    rocketParts.forEach(p => {
        p.relX = p.x - centerX;
        p.relY = p.y - centerY;
    });

    mode = 'FLIGHT';
    document.getElementById('vab-sidebar').style.display = 'none';
    document.getElementById('launch-bar').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    
    ship.x = 0; ship.y = 0; ship.vx = 0; ship.vy = 0;
}

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function drawPart(p, x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.fillStyle = p.color;

    if (p.id === 'capsule') {
        ctx.beginPath();
        ctx.moveTo(-p.w/2, p.h/2); ctx.lineTo(p.w/2, p.h/2);
        ctx.lineTo(p.w/3, -p.h/2); ctx.lineTo(-p.w/3, -p.h/2);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.strokeRect(-p.w/2, -p.h/2, p.w, p.h);
    }
    
    // Ombra stile SFS
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0, -p.h/2, p.w/2, p.h);
    ctx.restore();
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (mode === 'BUILD') {
        // Griglia
        ctx.strokeStyle = '#222';
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        rocketParts.forEach(p => drawPart(p, p.x, p.y));
        if (activePart) drawPart(activePart, activePart.x, activePart.y);
    } else {
        // Fisica
        if(keys['ArrowUp']) {
            ship.vx += Math.cos(ship.rot) * 0.2;
            ship.vy += Math.sin(ship.rot) * 0.2;
        }
        if(keys['ArrowLeft']) ship.rot -= 0.04;
        if(keys['ArrowRight']) ship.rot += 0.04;
        
        ship.vy += 0.05; // Gravità
        ship.x += ship.vx; ship.y += ship.vy;
        
        // Terreno
        if(ship.y > 0) { ship.y = 0; ship.vy = 0; ship.vx *= 0.9; ship.rot = -Math.PI/2; }

        ctx.save();
        // Camera Follow: Mette il razzo al centro dello schermo
        ctx.translate(canvas.width/2, canvas.height/2);
        
        // Disegna il suolo
        ctx.fillStyle = '#222';
        ctx.fillRect(-canvas.width/2, -ship.y + 40, canvas.width, 1000);

        // Disegna il razzo ruotato
        ctx.rotate(ship.rot + Math.PI/2);
        rocketParts.forEach(p => {
            drawPart(p, p.relX, p.relY);
        });

        // Fiamma
        if(keys['ArrowUp']) {
            ctx.fillStyle = '#4facfe';
            ctx.beginPath();
            ctx.moveTo(-10, 40); ctx.lineTo(10, 40);
            ctx.lineTo(0, 80 + Math.random()*20); ctx.fill();
        }
        ctx.restore();

        document.getElementById('h-vel').innerText = (Math.sqrt(ship.vx**2 + ship.vy**2)*10).toFixed(1);
        document.getElementById('h-alt').innerText = Math.abs(Math.floor(ship.y));
    }
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
