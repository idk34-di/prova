<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SFS Ultra Clone</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; }
        #editor { width: 260px; background: #151515; border-right: 1px solid #333; z-index: 100; overflow-y: auto; height: 100vh; }
        .category { padding: 10px; background: #222; font-size: 0.8em; color: #888; border-bottom: 1px solid #333; }
        .part-btn { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.9em; }
        .part-btn:hover { background: #252525; }
        .icon { width: 25px; height: 25px; border: 1px solid #777; flex-shrink: 0; }
        
        #game-view { flex-grow: 1; position: relative; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        
        .hud { position: absolute; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 5px; pointer-events: none; border: 1px solid #333; }
        #stats { top: 20px; right: 20px; text-align: right; }
        #instr { top: 20px; left: 20px; font-size: 0.8em; color: #aaa; }
        #launch-btn { position: absolute; bottom: 20px; right: 20px; padding: 15px 30px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="editor">
    <div class="category">COMANDO E AERODINAMICA</div>
    <div class="part-btn" onclick="setTool('capsule')"><div class="icon" style="border-radius:50% 50% 0 0"></div> Capsula</div>
    <div class="part-btn" onclick="setTool('parachute')"><div class="icon" style="background: #e74c3c"></div> Paracadute</div>
    <div class="part-btn" onclick="setTool('shield')"><div class="icon" style="border-bottom: 4px solid #633"></div> Scudo Termico</div>
    
    <div class="category">PROPULSIONE</div>
    <div class="part-btn" onclick="setTool('tank')"><div class="icon"></div> Serbatoio</div>
    <div class="part-btn" onclick="setTool('engine')"><div class="icon" style="height:15px"></div> Motore Hawk</div>
    <div class="part-btn" onclick="setTool('separator')"><div class="icon" style="background:#444"></div> Separatore</div>
    
    <div class="category">UTILITY</div>
    <div class="part-btn" onclick="setTool('solar')"><div class="icon" style="background:#2980b9"></div> Pannello Solare</div>
    <div class="part-btn" onclick="setTool('wheel')"><div class="icon" style="border-radius:50%"></div> Ruota Rover</div>
</div>

<div id="game-view">
    <div id="instr" class="hud">
        <b>EDITOR:</b> Clicca nello spazio vuoto per piazzare il pezzo.<br>
        <b>VOLO:</b> Frecce per muoverti, Spazio per attivare Separatore/Paracadute.
    </div>
    <div id="stats" class="hud" style="display:none">
        Alt: <span id="ui-alt">0</span> m<br>
        Vel: <span id="ui-vel">0</span> m/s<br>
        Fuel: <span id="ui-fuel">100</span>%
    </div>
    <button id="launch-btn" onclick="launch()">DECOLLO</button>
    <canvas id="sfsCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('sfsCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'build';
let currentTool = 'capsule';
let shipParts = [];
let rocket = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, fuel: 100, thrust: 0, mass: 0 };
let cam = { x: 0, y: 0, zoom: 1 };
let planets = [
    { name: "Terra", y: 1000, r: 800, color: '#27ae60', atm: '#3498db' },
    { name: "Luna", y: -15000, r: 300, color: '#95a5a6', atm: 'transparent' }
];

const PART_DATA = {
    capsule: { w: 30, h: 30, color: '#bdc3c7', mass: 2 },
    tank: { w: 30, h: 50, color: '#ecf0f1', mass: 4, fuel: 50 },
    engine: { w: 26, h: 20, color: '#34495e', mass: 1, thrust: 0.4 },
    separator: { w: 30, h: 10, color: '#444', mass: 0.5, isSeparator: true },
    parachute: { w: 20, h: 10, color: '#e74c3c', mass: 0.5, isChute: true },
    shield: { w: 34, h: 8, color: '#633', mass: 1 },
    solar: { w: 10, h: 40, color: '#2980b9', mass: 0.2 },
    wheel: { w: 15, h: 15, color: '#222', mass: 0.3 }
};

function setTool(t) { currentTool = t; }

// Click nell'editor per posizionare liberamente
canvas.addEventListener('mousedown', e => {
    if(gameState !== 'build') return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    // Posizionamento relativo al centro del razzo
    shipParts.push({
        type: currentTool,
        relX: mouseX - (canvas.width/2),
        relY: mouseY - (canvas.height - 200),
        ...PART_DATA[currentTool],
        active: true
    });
});

function launch() {
    if(shipParts.length === 0) return;
    gameState = 'flight';
    document.getElementById('launch-btn').style.display = 'none';
    document.getElementById('editor').style.display = 'none';
    document.getElementById('stats').style.display = 'block';
    
    // Calcola massa e carburante iniziale
    rocket.mass = shipParts.reduce((a, b) => a + b.mass, 0);
    rocket.x = canvas.width / 2;
    rocket.y = canvas.height - 200;
}

let keys = {};
window.onkeydown = e => {
    keys[e.code] = true;
    if(e.code === 'Space' && gameState === 'flight') triggerStage();
};
window.onkeyup = e => keys[e.code] = false;

function triggerStage() {
    // Funzione base: attiva paracadute o separa pezzi
    shipParts.forEach(p => {
        if(p.isChute) p.deployed = true;
        if(p.isSeparator) p.active = false; // Semplificato: i pezzi sotto il separatore dovrebbero cadere
    });
}

function update() {
    if(gameState !== 'flight') return;

    // Controlli e Rotazione
    if(keys['ArrowLeft']) rocket.angle -= 0.03;
    if(keys['ArrowRight']) rocket.angle += 0.03;

    // Motori
    let currentThrust = 0;
    if(keys['ArrowUp'] && rocket.fuel > 0) {
        shipParts.forEach(p => { if(p.type === 'engine' && p.active) currentThrust += p.thrust; });
        rocket.vx += Math.cos(rocket.angle) * currentThrust / rocket.mass;
        rocket.vy += Math.sin(rocket.angle) * currentThrust / rocket.mass;
        rocket.fuel -= 0.1;
    }

    // Gravità dinamica verso il pianeta più vicino
    planets.forEach(p => {
        let dx = rocket.x - (canvas.width/2);
        let dy = rocket.y - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < p.r + 5000) {
            let force = 0.15 * (p.r / dist);
            rocket.vx -= (dx/dist) * force;
            rocket.vy -= (dy/dist) * force;
        }
    });

    // Paracadute (attrito aria)
    shipParts.forEach(p => {
        if(p.deployed) {
            rocket.vx *= 0.98;
            rocket.vy *= 0.98;
        }
    });

    rocket.x += rocket.vx;
    rocket.y += rocket.vy;

    // PUNTO DI VISTA (Zoom dinamico basato su velocità e altezza)
    let speed = Math.sqrt(rocket.vx**2 + rocket.vy**2);
    let targetZoom = Math.max(0.2, 1 - (speed / 50));
    cam.zoom += (targetZoom - cam.zoom) * 0.05;
    cam.x = rocket.x;
    cam.y = rocket.y;

    // UI
    document.getElementById('ui-alt').innerText = Math.floor(Math.abs(rocket.y - planets[0].y + planets[0].r));
    document.getElementById('ui-vel').innerText = speed.toFixed(1);
    document.getElementById('ui-fuel').innerText = Math.max(0, rocket.fuel).toFixed(0);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    // Centro la telecamera sul razzo e applico lo ZOOM
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cam.x, -cam.y);

    // Disegna Pianeti
    planets.forEach(p => {
        // Atmosfera
        let grad = ctx.createRadialGradient(canvas.width/2, p.y, p.r, canvas.width/2, p.y, p.r + 300);
        grad.addColorStop(0, p.atm);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(canvas.width/2, p.y, p.r + 300, 0, Math.PI*2); ctx.fill();

        // Superficie
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(canvas.width/2, p.y, p.r, 0, Math.PI*2); ctx.fill();
    });

    // Disegna Razzo
    ctx.save();
    ctx.translate(rocket.x, rocket.y);
    ctx.rotate(rocket.angle + Math.PI/2);

    shipParts.forEach(p => {
        if(!p.active) return;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.relX, p.relY, p.w, p.h);
        ctx.strokeStyle = "white"; ctx.lineWidth = 1/cam.zoom;
        ctx.strokeRect(p.relX, p.relY, p.w, p.h);

        // Effetti speciali componenti
        if(p.type === 'engine' && keys['ArrowUp'] && rocket.fuel > 0) {
            ctx.fillStyle = "orange";
            ctx.fillRect(p.relX + 5, p.relY + p.h, p.w - 10, 20 + Math.random()*20);
        }
        if(p.deployed) { // Paracadute aperto
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(p.relX + p.w/2, p.relY - 40, 40, Math.PI, 0); ctx.fill();
        }
    });
    ctx.restore();
    ctx.restore();

    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
