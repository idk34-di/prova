<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SFS Master Clone</title>
    <style>
        :root { --accent: #4a90e2; --bg: #0f0f0f; --ui: #1a1a1a; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        canvas { display: block; }

        /* Sidebar SFS Style */
        #sidebar {
            position: absolute; right: 0; top: 0; bottom: 0; width: 200px;
            background: var(--ui); border-left: 1px solid #333; z-index: 100;
            display: flex; flex-direction: column;
        }
        .header { padding: 15px; font-size: 12px; color: #666; border-bottom: 1px solid #333; text-align: center; }
        .parts-container { flex: 1; overflow-y: auto; padding: 10px; }
        .part-btn {
            background: #252525; border: 1px solid #444; border-radius: 4px;
            padding: 12px 5px; margin-bottom: 10px; cursor: pointer; text-align: center;
            font-size: 11px; transition: 0.2s;
        }
        .part-btn:hover { border-color: var(--accent); background: #303030; }

        /* UI Volo */
        #hud {
            position: absolute; top: 20px; left: 20px; pointer-events: none; display: none;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 5px; border-left: 3px solid var(--accent);
        }
        .stat { font-family: monospace; font-size: 18px; margin-bottom: 5px; }
        .stat span { color: var(--accent); }

        #controls {
            position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px;
        }
        .btn {
            background: var(--accent); border: none; color: white; padding: 15px 30px;
            border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        #stage-btn { background: #ff9800; display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">BLUEPRINT PARTS</div>
    <div class="parts-container">
        <div class="part-btn" onmousedown="spawn('capsule')">CAPSULA</div>
        <div class="part-btn" onmousedown="spawn('fuel_lg')">SERBATOIO XL</div>
        <div class="part-btn" onmousedown="spawn('fuel_sm')">SERBATOIO S</div>
        <div class="part-btn" onmousedown="spawn('engine')">MOTORE</div>
        <div class="part-btn" onmousedown="spawn('separator')">SEPARATORE</div>
        <div class="part-btn" onmousedown="spawn('leg')">GAMBA</div>
        <div class="part-btn" onmousedown="spawn('solar')">PANNELLO SOLARE</div>
        <div class="part-btn" onmousedown="spawn('parachute')">PARACADUTE</div>
    </div>
</div>

<div id="hud">
    <div class="stat">VEL: <span id="v-val">0.0</span> m/s</div>
    <div class="stat">ALT: <span id="a-val">0</span> m</div>
</div>

<div id="controls">
    <button id="launch-btn" class="btn" onclick="launch()">Lancia</button>
    <button id="stage-btn" class="btn" onclick="triggerStage()">Sgancia</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mode = 'BUILD';
let parts = [];
let dragging = null;
let ship = { x: 0, y: 0, vx: 0, vy: 0, rot: -Math.PI/2 };

const DATA = {
    capsule:  { w: 40, h: 30, color: '#aaa', type: 'top' },
    fuel_lg:  { w: 40, h: 80, color: '#eee', type: 'body' },
    fuel_sm:  { w: 40, h: 40, color: '#eee', type: 'body' },
    engine:   { w: 30, h: 25, color: '#444', type: 'engine' },
    separator:{ w: 40, h: 10, color: '#ffc107', type: 'sep' },
    leg:      { w: 10, h: 40, color: '#888', type: 'leg' },
    solar:    { w: 15, h: 50, color: '#1a3a6a', type: 'solar' },
    parachute:{ w: 30, h: 15, color: '#d9534f', type: 'top' }
};

// --- EDITOR ---
function spawn(id) {
    const p = { ...DATA[id], id, x: (canvas.width-200)/2, y: canvas.height/2 };
    parts.push(p);
    dragging = p;
}

canvas.onmousedown = (e) => {
    if(mode !== 'BUILD' || e.clientX > canvas.width - 200) return;
    for(let i=parts.length-1; i>=0; i--) {
        let p = parts[i];
        if(Math.abs(e.clientX - p.x) < p.w/2 && Math.abs(e.clientY - p.y) < p.h/2) {
            dragging = parts.splice(i, 1)[0];
            return;
        }
    }
};

window.onmousemove = (e) => {
    if(!dragging) return;
    dragging.x = e.clientX;
    dragging.y = e.clientY;
    
    // Snap Magnetico migliorato
    parts.forEach(p => {
        if(Math.abs(dragging.x - p.x) < 20) {
            if(Math.abs(dragging.y - (p.y + p.h/2 + dragging.h/2)) < 15) {
                dragging.x = p.x; dragging.y = p.y + p.h/2 + dragging.h/2;
            }
            if(Math.abs(dragging.y - (p.y - p.h/2 - dragging.h/2)) < 15) {
                dragging.x = p.x; dragging.y = p.y - p.h/2 - dragging.h/2;
            }
        }
    });
};

window.onmouseup = () => dragging = null;

// --- VOLO ---
function launch() {
    if(parts.length === 0) return;
    mode = 'FLIGHT';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('launch-btn').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('stage-btn').style.display = 'block';
    
    let root = parts[0];
    parts.forEach(p => { p.rx = p.x - root.x; p.ry = p.y - root.y; });
    ship.x = 0; ship.y = 0;
}

function triggerStage() {
    let idx = parts.findIndex(p => p.id === 'separator');
    if(idx !== -1) parts.splice(idx); // Rimuove tutto sotto il separatore
}

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

// --- RENDERING ---
function drawPart(p, x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.fillStyle = p.color;

    if(p.id === 'capsule') {
        ctx.beginPath();
        ctx.moveTo(-p.w/2, p.h/2); ctx.lineTo(p.w/2, p.h/2);
        ctx.lineTo(p.w/3, -p.h/2); ctx.lineTo(-p.w/3, -p.h/2);
        ctx.fill(); ctx.stroke();
    } else if(p.id === 'engine') {
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(-p.w/4, -p.h/2); ctx.lineTo(p.w/4, -p.h/2);
        ctx.lineTo(p.w/2, p.h/2); ctx.lineTo(-p.w/2, p.h/2);
        ctx.fill(); ctx.stroke();
    } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.strokeRect(-p.w/2, -p.h/2, p.w, p.h);
    }
    
    // Ombra stile SFS
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0, -p.h/2, p.w/2, p.h);
    ctx.restore();
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if(mode === 'BUILD') {
        // Griglia Blueprint
        ctx.strokeStyle = '#1a1a1a';
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        
        parts.forEach(p => drawPart(p, p.x, p.y));
        if(dragging) drawPart(dragging, dragging.x, dragging.y);
    } else {
        // Fisica Volo
        if(keys['ArrowUp'] && parts.some(p => p.id === 'engine')) {
            ship.vx += Math.cos(ship.rot) * 0.2;
            ship.vy += Math.sin(ship.rot) * 0.2;
        }
        if(keys['ArrowLeft']) ship.rot -= 0.04;
        if(keys['ArrowRight']) ship.rot += 0.04;
        
        ship.vy += 0.06; // Gravità
        ship.x += ship.vx; ship.y += ship.vy;
        
        if(ship.y > 0) { ship.y = 0; ship.vy = 0; ship.vx *= 0.9; }

        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2); // Camera centrata
        
        // Terreno
        ctx.fillStyle = '#222';
        ctx.fillRect(-canvas.width/2, -ship.y + 40, canvas.width, 1000);

        ctx.rotate(ship.rot + Math.PI/2);
        parts.forEach(p => drawPart(p, p.rx, p.ry));

        // Fiamma
        if(keys['ArrowUp'] && parts.some(p => p.id === 'engine')) {
            let engine = parts.find(p => p.id === 'engine');
            ctx.fillStyle = '#4facfe';
            ctx.beginPath();
            ctx.moveTo(-10, engine.ry + 15); ctx.lineTo(10, engine.ry + 15);
            ctx.lineTo(0, engine.ry + 60 + Math.random()*20); ctx.fill();
        }
        ctx.restore();

        document.getElementById('v-val').innerText = (Math.sqrt(ship.vx**2 + ship.vy**2)*10).toFixed(1);
        document.getElementById('a-val').innerText = Math.abs(Math.floor(ship.y));
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
