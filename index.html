<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SFS Mobile Web Clone</title>
    <style>
        :root { --accent: #4a90e2; --ui-bg: #1e1e1e; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; cursor: crosshair; }
        
        /* UI Editor Stile SFS */
        #vab-sidebar {
            position: absolute; right: 0; top: 0; bottom: 0; width: 240px;
            background: var(--ui-bg); border-left: 2px solid #333;
            display: flex; flex-direction: column; z-index: 100;
        }
        .category-title { padding: 15px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; }
        .parts-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .part-item {
            background: #2a2a2a; border: 1px solid #444; border-radius: 4px;
            padding: 10px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .part-item:hover { border-color: var(--accent); background: #333; }
        .part-item img { width: 40px; height: auto; display: block; margin: 0 auto 5px; }
        .part-label { font-size: 11px; color: #ccc; }

        #launch-bar {
            position: absolute; bottom: 0; left: 0; right: 240px; height: 60px;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
        }
        .btn-launch {
            background: var(--accent); color: white; border: none; padding: 10px 40px;
            font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase;
        }
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; display: none; }
    </style>
</head>
<body>

<div id="vab-sidebar">
    <div class="category-title">Componenti</div>
    <div class="parts-grid">
        <div class="part-item" onmousedown="createPart('capsule')"><div class="part-label">Capsula</div></div>
        <div class="part-item" onmousedown="createPart('fuel_lg')"><div class="part-label">Serbatoio XL</div></div>
        <div class="part-item" onmousedown="createPart('fuel_sm')"><div class="part-label">Serbatoio S</div></div>
        <div class="part-item" onmousedown="createPart('engine')"><div class="part-label">Motore</div></div>
        <div class="part-item" onmousedown="createPart('separator')"><div class="part-label">Separatore</div></div>
        <div class="part-item" onmousedown="createPart('leg')"><div class="part-label">Gamba</div></div>
        <div class="part-item" onmousedown="createPart('parachute')"><div class="part-label">Paracadute</div></div>
    </div>
</div>

<div id="launch-bar">
    <button class="btn-launch" onclick="launchRocket()">Lancia Missione</button>
</div>

<div id="hud">
    <div style="font-size: 24px; font-weight: bold;"><span id="h-vel">0</span> m/s</div>
    <div style="color: #888;">Altitudine: <span id="h-alt">0</span> m</div>
</div>

<canvas id="screen"></canvas>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mode = 'BUILD';
let rocketParts = [];
let activePart = null;
let cam = { x: canvas.width/2 - 120, y: canvas.height/2, zoom: 1 };

const PART_DATA = {
    capsule:  { w: 40, h: 32, color: '#d1d1d1', type: 'cmd' },
    fuel_lg:  { w: 40, h: 80, color: '#f0f0f0', type: 'fuel' },
    fuel_sm:  { w: 40, h: 40, color: '#f0f0f0', type: 'fuel' },
    engine:   { w: 32, h: 25, color: '#444',   type: 'engine' },
    separator:{ w: 40, h: 12, color: '#ffcc00', type: 'sep' },
    leg:      { w: 10, h: 45, color: '#888',   type: 'leg' },
    parachute:{ w: 30, h: 15, color: '#ff4444', type: 'para' }
};

// --- Editor Logic ---
function createPart(id) {
    const data = PART_DATA[id];
    activePart = { ...data, id, x: cam.x, y: cam.y };
    rocketParts.push(activePart);
}

window.addEventListener('mousedown', (e) => {
    if (e.clientX > window.innerWidth - 240) return;
    const mx = e.clientX; const my = e.clientY;
    
    // Pick part from stage
    rocketParts.forEach((p, i) => {
        if (mx > p.x - p.w/2 && mx < p.x + p.w/2 && my > p.y - p.h/2 && my < p.y + p.h/2) {
            activePart = rocketParts.splice(i, 1)[0];
        }
    });
});

window.addEventListener('mousemove', (e) => {
    if (!activePart) return;
    activePart.x = e.clientX;
    activePart.y = e.clientY;

    // Smart Snapping
    rocketParts.forEach(p => {
        if (Math.abs(activePart.x - p.x) < 20) {
            // Snap vertical
            if (Math.abs(activePart.y - (p.y + p.h/2 + activePart.h/2)) < 20) {
                activePart.x = p.x; activePart.y = p.y + p.h/2 + activePart.h/2;
            }
            if (Math.abs(activePart.y - (p.y - p.h/2 - activePart.h/2)) < 20) {
                activePart.x = p.x; activePart.y = p.y - p.h/2 - activePart.h/2;
            }
        }
    });
});

window.addEventListener('mouseup', () => activePart = null);

// --- Flight Logic ---
let physics = { x: 0, y: 0, vx: 0, vy: 0, rot: -Math.PI/2, fuel: 100 };
function launchRocket() {
    if (rocketParts.length === 0) return;
    mode = 'FLIGHT';
    document.getElementById('vab-sidebar').style.display = 'none';
    document.getElementById('launch-bar').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    
    // Center rocket
    let topY = Math.min(...rocketParts.map(p => p.y));
    rocketParts.forEach(p => p.y -= topY);
    physics.y = 0;
}

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function drawPart(p, isFlight) {
    ctx.save();
    ctx.translate(p.x, p.y);
    
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.fillStyle = p.color;

    if (p.id === 'capsule') {
        ctx.beginPath();
        ctx.moveTo(-p.w/2, p.h/2); ctx.lineTo(p.w/2, p.h/2);
        ctx.lineTo(p.w/3, -p.h/2); ctx.lineTo(-p.w/3, -p.h/2);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (p.id === 'engine') {
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(-p.w/2, -p.h/2); ctx.lineTo(p.w/2, -p.h/2);
        ctx.lineTo(p.w/2 + 5, p.h/2); ctx.lineTo(-p.w/2 - 5, p.h/2);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.strokeRect(-p.w/2, -p.h/2, p.w, p.h);
    }
    
    // Dettaglio Texture SFS (Linea centrale e ombra)
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, -p.h/2, p.w/2, p.h);
    ctx.beginPath(); ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.moveTo(0, -p.h/2); ctx.lineTo(0, p.h/2); ctx.stroke();

    ctx.restore();
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (mode === 'BUILD') {
        // Grid background
        ctx.strokeStyle = '#151515';
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        
        rocketParts.forEach(p => drawPart(p, false));
    } else {
        // Flight
        if(keys['ArrowUp']) {
            physics.vx += Math.cos(physics.rot) * 0.15;
            physics.vy += Math.sin(physics.rot) * 0.15;
        }
        if(keys['ArrowLeft']) physics.rot -= 0.03;
        if(keys['ArrowRight']) physics.rot += 0.03;
        
        physics.vy += 0.05; // Gravity
        physics.x += physics.vx; physics.y += physics.vy;
        
        if(physics.y > 0) { physics.y = 0; physics.vy = 0; physics.vx *= 0.95; }

        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2 + 200);
        
        // Ground
        ctx.fillStyle = '#222';
        ctx.fillRect(-canvas.width/2, -physics.y + 30, canvas.width, 500);

        ctx.save();
        ctx.translate(-physics.x, -physics.y);
        ctx.rotate(physics.rot + Math.PI/2);
        rocketParts.forEach(p => drawPart(p, true));
        
        // Exhaust
        if(keys['ArrowUp']) {
            ctx.fillStyle = '#4facfe';
            let last = rocketParts.find(p => p.id === 'engine') || rocketParts[rocketParts.length-1];
            ctx.beginPath();
            ctx.moveTo(-10, last.y + 15); ctx.lineTo(10, last.y + 15);
            ctx.lineTo(0, last.y + 50 + Math.random()*20); ctx.fill();
        }
        ctx.restore();
        ctx.restore();

        document.getElementById('h-vel').innerText = (Math.sqrt(physics.vx**2 + physics.vy**2)*10).toFixed(1);
        document.getElementById('h-alt').innerText = Math.abs(Math.floor(physics.y));
    }
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
