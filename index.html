<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Mars Rover Simulator - Gale Crater Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a0a05; font-family: 'Courier New', Courier, monospace; }
        #gui {
            position: absolute; top: 20px; left: 20px; color: #ff6600;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border: 1px solid #ff6600;
            pointer-events: none; text-transform: uppercase;
        }
        .bar-container { width: 200px; height: 10px; border: 1px solid #ff6600; margin: 5px 0; }
        #power-bar { height: 100%; background: #ff6600; width: 100%; transition: width 0.3s; }
        #status { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #ff6600; font-size: 12px; }
    </style>
</head>
<body>

<div id="gui">
    <div><b>Rover Status: Active</b></div>
    <div>Power (MMRTG - Plutonium-238):</div>
    <div class="bar-container"><div id="power-bar"></div></div>
    <div>Samples Collected: <span id="sample-count">0</span>/10</div>
    <div style="margin-top: 10px; font-size: 10px;">Coords: <span id="coords">0, 0</span></div>
</div>

<div id="status">COMANDI: WASD per muoverti | SPAZIO per usare il trapano</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';

// Configurazione Iniziale
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbc7967); // Cielo marziano butterscotch
scene.fog = new THREE.FogExp2(0xbc7967, 0.02);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luci
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(10, 20, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040, 0.5));

// Terreno (Gale Crater)
// Suggerimento: Per il massimo realismo, carica 'image_765dfa.jpg' come Displacement Map
const geometry = new THREE.PlaneGeometry(200, 200, 100, 100);
const material = new THREE.MeshStandardMaterial({ 
    color: 0x8b4513, 
    roughness: 0.8,
    wireframe: false 
});
const terrain = new THREE.Mesh(geometry, material);
terrain.rotation.x = -Math.PI / 2;
scene.add(terrain);

// Rover (Modello semplificato)
const roverGroup = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 1.5), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
roverGroup.add(body);
scene.add(roverGroup);

camera.position.set(0, 5, 5);
camera.lookAt(roverGroup.position);

// Variabili di Gioco
let power = 100;
let samples = 0;
const keys = {};
document.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
document.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

function updatePhysics() {
    const speed = 0.05;
    if (keys['w'] && power > 0) {
        roverGroup.translateZ(-speed);
        power -= 0.01;
    }
    if (keys['s'] && power > 0) {
        roverGroup.translateZ(speed);
        power -= 0.01;
    }
    if (keys['a']) roverGroup.rotation.y += 0.03;
    if (keys['d']) roverGroup.rotation.y -= 0.03;

    // Trapano
    if (keys[' '] && power > 2) {
        console.log("Scavo in corso...");
        power -= 0.1;
        // Logica per trovare vita qui
    }

    // Camera segue il rover
    const relativeCameraOffset = new THREE.Vector3(0, 3, 6);
    const cameraOffset = relativeCameraOffset.applyMatrix4(roverGroup.matrixWorld);
    camera.position.lerp(cameraOffset, 0.1);
    camera.lookAt(roverGroup.position);

    // Update UI
    document.getElementById('power-bar').style.width = power + "%";
    document.getElementById('coords').innerText = `${roverGroup.position.x.toFixed(2)}, ${roverGroup.position.z.toFixed(2)}`;
}

function animate() {
    requestAnimationFrame(animate);
    updatePhysics();
    renderer.render(scene, camera);
}

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

animate();
</script>
</body>
</html>
