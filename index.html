<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Spaceflight Simulator Ultra Web</title>
    <style>
        :root { --bg: #050505; --panel: #1a1a1a; --accent: #3498db; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; }
        
        /* Menu Laterale */
        #ui-left { width: 280px; background: var(--panel); border-right: 2px solid #333; display: flex; flex-direction: column; z-index: 100; }
        .header { padding: 20px; font-weight: bold; background: #222; text-align: center; border-bottom: 1px solid #444; }
        .category { padding: 10px; font-size: 0.75em; color: #777; background: #111; letter-spacing: 1px; }
        .part-list { overflow-y: auto; flex-grow: 1; }
        .part-card { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
        .part-card:hover { background: #252525; }
        .part-card.selected { border-left: 4px solid var(--accent); background: #222; }
        .preview-box { width: 40px; height: 40px; border: 1px dashed #555; display: flex; align-items: center; justify-content: center; }

        /* Area Gioco */
        #game-container { flex-grow: 1; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }

        /* HUD di Volo */
        .hud { position: absolute; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 1px solid #444; pointer-events: none; display: none; }
        #telemetry { top: 20px; right: 20px; width: 180px; }
        #staging { bottom: 20px; left: 20px; width: 120px; text-align: center; }
        
        #btn-launch { position: absolute; bottom: 30px; right: 30px; padding: 18px 50px; background: #27ae60; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1em; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #btn-launch:hover { background: #2ecc71; transform: translateY(-2px); }
    </style>
</head>
<body>

div id="ui-left">
    <div class="header">COSTRUZIONE VAB</div>
    <div class="category">STRUTTURA & COMANDO</div>
    <div class="part-list" id="parts-menu">
        <!-- Generato via JS -->
    </div>
</div>

<div id="game-container">
    <button id="btn-launch" onclick="launchRocket()">DECOLLO</button>
    
    <div id="telemetry" class="hud">
        <div style="font-size: 0.8em; color: #888;">ALTITUDINE</div>
        <div id="ui-alt" style="font-size: 1.3em; font-weight: bold;">0 m</div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
        <div style="font-size: 0.8em; color: #888;">VELOCITÀ</div>
        <div id="ui-vel" style="font-size: 1.3em; font-weight: bold;">0.0 m/s</div>
    </div>

    <div id="staging" class="hud">
        <div id="ui-fuel-label">FUEL</div>
        <div style="background: #333; height: 8px; margin-top: 5px;"><div id="ui-fuel-bar" style="width: 100%; height: 100%; background: #3498db;"></div></div>
        <small style="display:block; margin-top:10px; color:#aaa;">SPAZIO: Stadio</small>
    </div>

    <canvas id="sfsCanvas"></canvas>
</div>

<script>
/** 
 * CONFIGURAZIONE COMPONENTI
 */
const PART_DEFS = {
    capsule: { name: "Capsula", w: 40, h: 40, color: "#bdc3c7", mass: 2, icon: "▲" },
    tank_m: { name: "Serbatoio M", w: 40, h: 60, color: "#ecf0f1", mass: 4, fuel: 100, icon: "█" },
    engine_h: { name: "Motore Hawk", w: 32, h: 25, color: "#34495e", mass: 1, thrust: 0.6, icon: "▼" },
    separator: { name: "Separatore", w: 40, h: 12, color: "#e67e22", mass: 0.5, isSeparator: true, icon: "▬" },
    solar: { name: "Pannello Solare", w: 12, h: 45, color: "#2980b9", mass: 0.3, isSolar: true, icon: "||" },
    parachute: { name: "Paracadute", w: 30, h: 15, color: "#c0392b", mass: 0.4, isChute: true, icon: "∩" },
    shield: { name: "Scudo Termico", w: 44, h: 10, color: "#4e342e", mass: 1, icon: "◡" }
};

/**
 * STATO GLOBALE
 */
const canvas = document.getElementById('sfsCanvas');
const ctx = canvas.getContext('2d');
let mode = 'build'; // 'build' o 'flight'
let selectedType = 'capsule';
let ship = [];
let rocket = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, fuel: 100, zoom: 1 };
let worldY = 0;

/**
 * INIZIALIZZAZIONE EDITOR
 */
const menu = document.getElementById('parts-menu');
Object.keys(PART_DEFS).forEach(key => {
    let p = PART_DEFS[key];
    let div = document.createElement('div');
    div.className = `part-card ${key === selectedType ? 'selected' : ''}`;
    div.onclick = () => {
        selectedType = key;
        document.querySelectorAll('.part-card').forEach(c => c.classList.remove('selected'));
        div.classList.add('selected');
    };
    div.innerHTML = `<div class="preview-box">${p.icon}</div> <div>${p.name}</div>`;
    menu.appendChild(div);
});

canvas.addEventListener('mousedown', (e) => {
    if(mode !== 'build') return;
    const rect = canvas.getBoundingClientRect();
    ship.push({
        ...PART_DEFS[selectedType],
        relX: e.clientX - rect.left - canvas.width/2,
        relY: e.clientY - rect.top - (canvas.height - 200),
        active: true,
        state: 0 // 0: chiuso, 1: aperto
    });
});

/**
 * FISICA E VOLO
 */
function launchRocket() {
    if(ship.length === 0) return;
    mode = 'flight';
    document.getElementById('ui-left').style.display = 'none';
    document.getElementById('btn-launch').style.display = 'none';
    document.querySelectorAll('.hud').forEach(h => h.style.display = 'block');
    rocket.x = canvas.width/2;
    rocket.y = canvas.height - 200;
}

let keys = {};
window.onkeydown = e => {
    keys[e.code] = true;
    if(e.code === 'Space' && mode === 'flight') activateNextStage();
};
window.onkeyup = e => keys[e.code] = false;

function activateNextStage() {
    // Esempio: apre tutti i paracadute e pannelli insieme
    ship.forEach(p => {
        if(p.isChute || p.isSolar) p.state = 1;
        if(p.isSeparator) p.active = false; // "Sgancia" il pezzo
    });
}

function update() {
    if(mode !== 'flight') return;

    if(keys['ArrowLeft']) rocket.angle -= 0.04;
    if(keys['ArrowRight']) rocket.angle += 0.04;

    let thrustSum = 0;
    if(keys['ArrowUp'] && rocket.fuel > 0) {
        ship.forEach(p => { if(p.thrust && p.active) thrustSum += p.thrust; });
        rocket.vx += Math.cos(rocket.angle) * thrustSum;
        rocket.vy += Math.sin(rocket.angle) * thrustSum;
        rocket.fuel -= 0.12;
    }

    // Gravità e Attrito Aria
    rocket.vy += 0.1; 
    let speed = Math.sqrt(rocket.vx**2 + rocket.vy**2);
    
    // Se paracadute aperto, forte rallentamento
    ship.forEach(p => { if(p.isChute && p.state === 1) { rocket.vx *= 0.96; rocket.vy *= 0.96; } });

    rocket.x += rocket.vx;
    rocket.y += rocket.vy;
    worldY = rocket.y - (canvas.height - 200);

    // Zoom Dinamico basato su altezza e velocità
    let targetZoom = Math.max(0.2, 1 - (speed/60) - (Math.abs(worldY)/10000));
    rocket.zoom += (targetZoom - rocket.zoom) * 0.05;

    // UI
    document.getElementById('ui-alt').innerText = Math.floor(Math.abs(worldY)/5) + " m";
    document.getElementById('ui-vel').innerText = (speed*3).toFixed(1) + " m/s";
    document.getElementById('ui-fuel-bar').style.width = Math.max(0, rocket.fuel) + "%";

    // Collisione Suolo
    if(rocket.y > canvas.height - 200) {
        rocket.y = canvas.height - 200;
        rocket.vy = 0; rocket.vx *= 0.8;
    }
}

/**
 * RENDERING
 */
function draw() {
    canvas.width = window.innerWidth - (mode === 'build' ? 280 : 0);
    canvas.height = window.innerHeight;

    ctx.fillStyle = "#000";
    ctx.fillRect(0,0, canvas.width, canvas.height);

    ctx.save();
    if(mode === 'flight') {
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(rocket.zoom, rocket.zoom);
        ctx.translate(-rocket.x, -rocket.y);
    }

    // Terreno
    ctx.fillStyle = "#1e1e1e";
    ctx.fillRect(-10000, canvas.height - 200, 20000, 1000);
    ctx.strokeStyle = "#333";
    for(let i=-5000; i<5000; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, canvas.height-200); ctx.lineTo(i, canvas.height+800); ctx.stroke();
    }

    // Razzo
    ctx.save();
    if(mode === 'flight') {
        ctx.translate(rocket.x, rocket.y);
        ctx.rotate(rocket.angle + Math.PI/2);
    } else {
        ctx.translate(canvas.width/2, canvas.height - 200);
    }

    ship.forEach(p => {
        if(!p.active) return;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.relX, p.relY, p.w, p.h);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.strokeRect(p.relX, p.relY, p.w, p.h);

        // Motori Accesi
        if(p.thrust && keys['ArrowUp'] && rocket.fuel > 0 && mode === 'flight') {
            ctx.fillStyle = "orange";
            ctx.fillRect(p.relX + p.w*0.2, p.relY + p.h, p.w*0.6, 20 + Math.random()*30);
        }

        // Paracadute Aperto
        if(p.isChute && p.state === 1) {
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(p.relX + p.w/2, p.relY - 60, 40, Math.PI, 0); ctx.fill();
            ctx.strokeStyle = "white";
            ctx.beginPath(); ctx.moveTo(p.relX, p.relY); ctx.lineTo(p.relX + p.w/2, p.relY-60); ctx.stroke();
        }

        // Pannelli Solari Aperti
        if(p.isSolar && p.state === 1) {
            ctx.fillStyle = "#1a5276";
            ctx.fillRect(p.relX - 40, p.relY + 5, 40, 10);
            ctx.fillRect(p.relX + p.w, p.relY + 5, 40, 10);
        }
    });

    ctx.restore();
    ctx.restore();

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
