<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SFS Clone - Fix Clic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; color: white; }
        canvas { display: block; background: #0a0a0a; }
        
        /* Menu laterale */
        #vab {
            position: absolute; right: 0; top: 0; bottom: 0;
            width: 200px; background: #1a1a1a; border-left: 2px solid #333;
            padding: 10px; z-index: 10;
        }
        .btn {
            background: #333; border: 1px solid #555; color: white;
            padding: 15px 10px; margin: 8px 0; width: 100%; cursor: pointer;
            text-align: center; border-radius: 4px; font-weight: bold;
        }
        .btn:hover { background: #444; border-color: #007bff; }
        #launch { background: #28a745; margin-top: 20px; }
        
        #hud {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
            display: none; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="vab">
    <h3 style="text-align:center">COSTRUZIONE</h3>
    <div class="btn" onmousedown="spawn('capsule')">CAPSULA</div>
    <div class="btn" onmousedown="spawn('fuel')">SERBATOIO</div>
    <div class="btn" onmousedown="spawn('engine')">MOTORE</div>
    <div class="btn" onmousedown="spawn('separator')">SEPARATORE</div>
    <button id="launch" class="btn" onclick="go()">LANCIA</button>
</div>

<div id="hud">
    Velocità: <span id="v">0</span> m/s<br>
    Altezza: <span id="a">0</span> m
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mode = 'BUILD';
let parts = [];
let dragging = null;
let mouse = { x: 0, y: 0 };

// --- LOGICA CLICK E TRASCINAMENTO ---
function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

canvas.onmousedown = (e) => {
    if(mode !== 'BUILD') return;
    const pos = getMousePos(e);
    
    // Controlla se hai cliccato un pezzo esistente
    for(let i = parts.length - 1; i >= 0; i--) {
        let p = parts[i];
        if(pos.x > p.x - p.w/2 && pos.x < p.x + p.w/2 &&
           pos.y > p.y - p.h/2 && pos.y < p.y + p.h/2) {
            dragging = parts.splice(i, 1)[0];
            return;
        }
    }
};

window.onmousemove = (e) => {
    const pos = getMousePos(e);
    mouse.x = pos.x;
    mouse.y = pos.y;
    
    if(dragging) {
        dragging.x = pos.x;
        dragging.y = pos.y;
        
        // Snap Magnetico verso altri pezzi
        parts.forEach(p => {
            if(Math.abs(dragging.x - p.x) < 20) {
                if(Math.abs(dragging.y - (p.y + p.h/2 + dragging.h/2)) < 20) {
                    dragging.x = p.x; dragging.y = p.y + p.h/2 + dragging.h/2;
                }
                if(Math.abs(dragging.y - (p.y - p.h/2 - dragging.h/2)) < 20) {
                    dragging.x = p.x; dragging.y = p.y - p.h/2 - dragging.h/2;
                }
            }
        });
    }
};

window.onmouseup = () => { dragging = null; };

function spawn(type) {
    // Crea il pezzo al centro dello schermo pronto per essere spostato
    const p = { 
        type, 
        x: canvas.width/2 - 100, 
        y: canvas.height/2, 
        w: 40, h: (type==='fuel'?60:30),
        color: (type==='capsule'?'#aaa':type==='engine'?'#444':'#eee')
    };
    parts.push(p);
    dragging = p; // Lo aggancia subito al mouse
}

// --- VOLO ---
let ship = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2 };
function go() {
    if(parts.length === 0) return;
    mode = 'FLIGHT';
    document.getElementById('vab').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    ship.y = 0;
}

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if(mode === 'BUILD') {
        // Disegna griglia
        ctx.strokeStyle = '#222';
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        
        parts.forEach(drawPart);
        if(dragging) drawPart(dragging);
    } else {
        // Logica Volo Semplice
        if(keys['ArrowUp']) {
            ship.vx += Math.cos(ship.angle) * 0.1;
            ship.vy += Math.sin(ship.angle) * 0.1;
        }
        if(keys['ArrowLeft']) ship.angle -= 0.05;
        if(keys['ArrowRight']) ship.angle += 0.05;
        
        ship.vy += 0.02; // Gravità
        ship.x += ship.vx; ship.y += ship.vy;
        if(ship.y > 0) { ship.y = 0; ship.vy = 0; ship.vx *= 0.9; }

        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2 + (canvas.height/3));
        ctx.translate(-ship.x, -ship.y);
        
        // Suolo
        ctx.fillStyle = '#333';
        ctx.fillRect(ship.x - 500, 25, 1000, 100);
        
        // Razzo
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.rotate(ship.angle + Math.PI/2);
        let offset = 0;
        parts.forEach(p => {
            drawPart({ ...p, x: 0, y: offset });
            offset += p.h;
        });
        ctx.restore();
        ctx.restore();
        
        document.getElementById('v').innerText = Math.abs(ship.vx).toFixed(1);
        document.getElementById('a').innerText = Math.abs(Math.floor(ship.y));
    }
    requestAnimationFrame(loop);
}

function drawPart(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.strokeRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
}

loop();
</script>
</body>
</html>
