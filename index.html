<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sintetizzatore Web Audio</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; padding: 50px; }
        .controls { background: #333; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        label { display: block; margin-bottom: 10px; }
        input, select { width: 100%; margin-top: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:active { background: #0056b3; }
    </style>
</head>
<body>

    <h2>Mini Synth JS</h2>
    
    <div class="controls">
        <label>
            Tipo di Onda:
            <select id="oscType">
                <option value="sine">Sinusoidale (Dolce)</option>
                <option value="square">Quadra (Retro/8-bit)</option>
                <option value="sawtooth">Dente di sega (Ruvido)</option>
                <option value="triangle">Triangolare (Morbido)</option>
            </select>
        </label>

        <label>
            Frequenza: <span id="freqVal">440</span> Hz
            <input type="range" id="freq" min="100" max="2000" value="440">
        </label>

        <label>
            Volume:
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
        </label>

        <button id="playBtn">AVVIA / FERMA</button>
    </div>

    <script>
        let audioCtx;
        let oscillator;
        let gainNode;
        let isPlaying = false;

        const playBtn = document.getElementById('playBtn');
        const oscType = document.getElementById('oscType');
        const freqSlider = document.getElementById('freq');
        const freqVal = document.getElementById('freqVal');
        const volSlider = document.getElementById('volume');

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
        }

        playBtn.addEventListener('click', () => {
            if (!audioCtx) initAudio();

            if (!isPlaying) {
                // Crea l'oscillatore
                oscillator = audioCtx.createOscillator();
                oscillator.type = oscType.value;
                oscillator.frequency.setValueAtTime(freqSlider.value, audioCtx.currentTime);
                
                // Collega: Oscillatore -> Volume -> Casse
                oscillator.connect(gainNode);
                gainNode.gain.setValueAtTime(volSlider.value, audioCtx.currentTime);
                
                oscillator.start();
                playBtn.innerText = "FERMA";
                isPlaying = true;
            } else {
                oscillator.stop();
                playBtn.innerText = "AVVIA";
                isPlaying = false;
            }
        });

        // Aggiornamento parametri in tempo reale
        freqSlider.oninput = () => {
            freqVal.innerText = freqSlider.value;
            if (isPlaying) oscillator.frequency.setTargetAtTime(freqSlider.value, audioCtx.currentTime, 0.05);
        };

        oscType.onchange = () => {
            if (isPlaying) oscillator.type = oscType.value;
        };

        volSlider.oninput = () => {
            if (isPlaying) gainNode.gain.setTargetAtTime(volSlider.value, audioCtx.currentTime, 0.05);
        };
    </script>
</body>
</html>
